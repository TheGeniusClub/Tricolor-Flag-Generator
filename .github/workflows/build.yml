name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: tricolor-flag-generator-linux
            ext: ""
          - os: windows-latest
            artifact: tricolor-flag-generator-windows
            ext: .exe
          - os: macos-latest
            artifact: tricolor-flag-generator-macos
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pillow pyinstaller
      - name: Build executable
        run: |
          pyinstaller --onefile --name tricolor-flag-generator \
            --hidden-import src.core \
            --hidden-import src.i18n \
            --hidden-import src.models \
            --hidden-import src.widgets \
            --hidden-import src.ui \
            --collect-all customtkinter \
            src/main.py
        shell: bash
      - name: Rename artifact
        run: |
          mkdir -p dist/release
          cp dist/tricolor-flag-generator${{ matrix.ext }} dist/release/${{ matrix.artifact }}${{ matrix.ext }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
